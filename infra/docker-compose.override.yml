services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    image: jan-frontend-dev
    working_dir: /app
    volumes:
      - ../frontend:/app:cached
      - /app/node_modules
    ports:
      - "5173:5173"

    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_TARGET=http://backend:4000
    depends_on:
      - backend
