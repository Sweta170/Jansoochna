services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: changeme
      MYSQL_DATABASE: jansoochna
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ../backend
    ports:
      - "4000:4000"
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASS=changeme
      - DB_NAME=jansoochna
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
  frontend:
    build: ../frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
